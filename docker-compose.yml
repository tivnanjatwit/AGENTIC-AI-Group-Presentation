services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        NODE_VERSION: 24.13.1
        N8N_VERSION: latest
    container_name: n8n_runtime
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - TZ=UTC
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
